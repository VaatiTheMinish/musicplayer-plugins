# How CI works:
#   The 'changes' job uses dorny/paths-filter to check which plugin folders have
#   modified files. Only the build job for that plugin runs — other plugins are
#   skipped entirely.
#
# Adding a new plugin:
#   1. Add a new entry under 'filters:' in the 'changes' job:
#        myplugin:
#          - 'myplugin/**'
#   2. Add a new build job copying the 'build-obssongoverlay' pattern:
#        build-myplugin:
#          needs: changes
#          if: needs.changes.outputs.myplugin == 'true'
#          ...

name: Build Plugins

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Detects which plugin folders have changes
  changes:
    runs-on: ubuntu-latest
    outputs:
      obssongoverlay: ${{ steps.filter.outputs.obssongoverlay }}
      ytdlpgui: ${{ steps.filter.outputs.ytdlpgui }}
      durationfilter: ${{ steps.filter.outputs.durationfilter }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            obssongoverlay:
              - 'obssongoverlay/**'
            ytdlpgui:
              - 'ytdlpgui/**'
            durationfilter:
              - 'durationfilter/**'

  build-songexport:
    needs: changes
    if: needs.changes.outputs.obssongoverlay == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Build
        run: ./gradlew :songexport:shadowJar
      - uses: actions/upload-artifact@v4
        with:
          name: songexport
          path: songexport/build/libs/songexport.jar

  build-ytdlpgui:
    needs: changes
    if: needs.changes.outputs.ytdlpgui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Build
        run: ./gradlew :ytdlpgui:shadowJar
      - uses: actions/upload-artifact@v4
        with:
          name: ytdlpgui
          path: ytdlpgui/build/libs/ytdlpgui.jar

  build-durationfilter:
    needs: changes
    if: needs.changes.outputs.durationfilter == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Build
        run: ./gradlew :durationfilter:shadowJar
      - uses: actions/upload-artifact@v4
        with:
          name: durationfilter
          path: durationfilter/build/libs/durationfilter.jar
